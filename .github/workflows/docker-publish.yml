name: Docker

on:
  workflow_dispatch:
  push:
    branches: [main, dev, test]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/zooai/exchange
      runner-amd64: ubuntu-latest
      runner-arm64: ubuntu-24.04-arm
    secrets: inherit
